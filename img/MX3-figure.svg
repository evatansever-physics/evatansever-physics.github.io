<svg viewBox="0 0 400 240" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="240" fill="#E8F5F4"/>
  <!-- Layered 2D lattice illustration representing MX3 monolayers -->
  <g opacity="0.9">
    <!-- Layer 1 (back) -->
    <g transform="translate(40,150)">
      <polygon points="0,0 30,-17 60,0 30,17" fill="none" stroke="#9AC9C5" stroke-width="1.2"/>
      <polygon points="60,0 90,-17 120,0 90,17" fill="none" stroke="#9AC9C5" stroke-width="1.2"/>
      <polygon points="120,0 150,-17 180,0 150,17" fill="none" stroke="#9AC9C5" stroke-width="1.2"/>
      <polygon points="180,0 210,-17 240,0 210,17" fill="none" stroke="#9AC9C5" stroke-width="1.2"/>
      <polygon points="240,0 270,-17 300,0 270,17" fill="none" stroke="#9AC9C5" stroke-width="1.2"/>
    </g>
    <!-- Layer 2 (middle) -->
    <g transform="translate(40,110)">
      <polygon points="0,0 30,-17 60,0 30,17" fill="none" stroke="#5A8A87" stroke-width="1.4"/>
      <polygon points="60,0 90,-17 120,0 90,17" fill="none" stroke="#5A8A87" stroke-width="1.4"/>
      <polygon points="120,0 150,-17 180,0 150,17" fill="none" stroke="#5A8A87" stroke-width="1.4"/>
      <polygon points="180,0 210,-17 240,0 210,17" fill="none" stroke="#5A8A87" stroke-width="1.4"/>
      <polygon points="240,0 270,-17 300,0 270,17" fill="none" stroke="#5A8A87" stroke-width="1.4"/>
      <!-- metal atoms M -->
      <circle cx="30" cy="-17" r="5" fill="#0F2E2E"/>
      <circle cx="90" cy="-17" r="5" fill="#0F2E2E"/>
      <circle cx="150" cy="-17" r="5" fill="#0F2E2E"/>
      <circle cx="210" cy="-17" r="5" fill="#0F2E2E"/>
      <circle cx="270" cy="-17" r="5" fill="#0F2E2E"/>
      <circle cx="0" cy="0" r="5" fill="#0F2E2E"/>
      <circle cx="60" cy="0" r="5" fill="#0F2E2E"/>
      <circle cx="120" cy="0" r="5" fill="#0F2E2E"/>
      <circle cx="180" cy="0" r="5" fill="#0F2E2E"/>
      <circle cx="240" cy="0" r="5" fill="#0F2E2E"/>
      <circle cx="300" cy="0" r="5" fill="#0F2E2E"/>
      <circle cx="30" cy="17" r="5" fill="#0F2E2E"/>
      <circle cx="90" cy="17" r="5" fill="#0F2E2E"/>
      <circle cx="150" cy="17" r="5" fill="#0F2E2E"/>
      <circle cx="210" cy="17" r="5" fill="#0F2E2E"/>
      <circle cx="270" cy="17" r="5" fill="#0F2E2E"/>
      <!-- halide atoms X -->
      <circle cx="0" cy="0" r="2.4" fill="#4ECDC4"/>
      <circle cx="30" cy="-17" r="2.4" fill="#4ECDC4"/>
      <circle cx="60" cy="0" r="2.4" fill="#4ECDC4"/>
      <circle cx="90" cy="-17" r="2.4" fill="#4ECDC4"/>
      <circle cx="120" cy="0" r="2.4" fill="#4ECDC4"/>
      <circle cx="150" cy="-17" r="2.4" fill="#4ECDC4"/>
      <circle cx="180" cy="0" r="2.4" fill="#4ECDC4"/>
      <circle cx="210" cy="-17" r="2.4" fill="#4ECDC4"/>
      <circle cx="240" cy="0" r="2.4" fill="#4ECDC4"/>
      <circle cx="270" cy="-17" r="2.4" fill="#4ECDC4"/>
      <circle cx="300" cy="0" r="2.4" fill="#4ECDC4"/>
    </g>
    <!-- Layer 3 (front, slightly offset to suggest stacking) -->
    <g transform="translate(40,75)">
      <polygon points="0,0 30,-17 60,0 30,17" fill="none" stroke="#C4E0DE" stroke-width="1"/>
      <polygon points="60,0 90,-17 120,0 90,17" fill="none" stroke="#C4E0DE" stroke-width="1"/>
      <polygon points="120,0 150,-17 180,0 150,17" fill="none" stroke="#C4E0DE" stroke-width="1"/>
      <polygon points="180,0 210,-17 240,0 210,17" fill="none" stroke="#C4E0DE" stroke-width="1"/>
      <polygon points="240,0 270,-17 300,0 270,17" fill="none" stroke="#C4E0DE" stroke-width="1"/>
    </g>
  </g>
  <!-- spin arrows suggesting ferromagnetic alignment -->
  <g stroke="#0F2E2E" stroke-width="2" fill="none" opacity="0.55">
    <line x1="70" y1="100" x2="70" y2="84" marker-end="url(#arrow)"/>
    <line x1="130" y1="100" x2="130" y2="84" marker-end="url(#arrow)"/>
    <line x1="190" y1="100" x2="190" y2="84" marker-end="url(#arrow)"/>
    <line x1="250" y1="100" x2="250" y2="84" marker-end="url(#arrow)"/>
    <line x1="310" y1="100" x2="310" y2="84" marker-end="url(#arrow)"/>
  </g>
  <defs>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#0F2E2E"/>
    </marker>
  </defs>
  <text x="200" y="215" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#5A8A87" letter-spacing="1">PLACEHOLDER — MX3 MONOLAYER LATTICE</text>
</svg>
